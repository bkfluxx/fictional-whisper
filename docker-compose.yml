services:
  app:
    image: ghcr.io/bkfluxx/fictional-whisper:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      CRON_SECRET: ${CRON_SECRET:-fw-cron-xK9mP2qR7vLt4nWs8jYd3hBm}
      BACKUP_SECRET: ${BACKUP_SECRET:-fw-backup-pQ6nF1rZ5cEa2wVi9kTm4jXo}
    volumes:
      - attachments:/app/attachments
      - backups:/app/backups
      - logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: aura
      POSTGRES_USER: fw
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fw -d aura"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ollama:
  #   image: ollama/ollama:latest
  #   volumes:
  #     - ollama_models:/root/.ollama
  #   environment:
  #     - OLLAMA_NUM_PARALLEL=1
  #     - OLLAMA_MAX_LOADED_MODELS=1
  #   restart: unless-stopped

volumes:
  pgdata:
  attachments:
  backups:
  logs:
  ollama_models:
