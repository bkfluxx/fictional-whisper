services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      CRON_SECRET: ${CRON_SECRET:-fw-cron-xK9mP2qR7vLt4nWs8jYd3hBm}
      BACKUP_SECRET: ${BACKUP_SECRET:-fw-backup-pQ6nF1rZ5cEa2wVi9kTm4jXo}
      WHISPER_BASE_URL: http://whisper:8000
    volumes:
      - attachments:/app/attachments
      - backups:/app/backups
      - logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      whisper:
        condition: service_started
    restart: unless-stopped

  whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    ports:
      - "8000:8000"
    environment:
      ASR_MODEL: ${WHISPER_MODEL:-Systran/faster-whisper-small}
    volumes:
      - whisper_models:/root/.cache/huggingface
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: aura
      POSTGRES_USER: fw
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fw -d aura"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
  attachments:
  backups:
  logs:
  whisper_models:
